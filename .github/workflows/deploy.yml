name: Deploy Terraform en LocalStack        # Nombre del workflow que aparecerá en GitHub Actions

on:
  push:
    branches: [ "main" ]                   # Se ejecuta automáticamente en cada push a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest                 # GitHub ejecuta el workflow en una máquina Ubuntu

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3          # Descarga el código del repositorio en la máquina runner

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v2 # Instala Terraform en el runner

      - name: Instalar LocalStack CLI
        run: pip install localstack         # Instala la CLI de LocalStack (necesaria para iniciar el servicio)

      - name: Iniciar LocalStack en background
        run: localstack start -d            # Inicia LocalStack en modo "detached" (en segundo plano)

      - name: Esperar a que LocalStack esté listo
        run: |
          echo "Esperando LocalStack..."
          localstack wait -t 30             # Espera hasta que LocalStack esté operativo (máx. 30s)

      - name: Inicializar Terraform
        run: terraform init                 # Inicializa Terraform y descarga providers (apuntando a LocalStack)

      - name: Plan Terraform
        run: terraform plan                 # Muestra los cambios que Terraform aplicará

      - name: Aplicar Terraform (auto-approve)
        run: terraform apply -auto-approve  # Aplica los cambios automáticamente sin pedir confirmación
