name: Deploy Terraform en LocalStack

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LOCALSTACK_API_KEY: ""
      LOCALSTACK_AUTH_TOKEN: ""
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENTS: "1"

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Iniciar LocalStack (modo FREE)
        run: |
          docker run -d --name localstack \
            -p 4566:4566 -p 4571:4571 \
            -e SERVICES=s3 \
            -e DEBUG=1 \
            localstack/localstack:latest

      - name: Esperar a que LocalStack esté listo
        run: |
          echo "Esperando LocalStack..."
          sleep 10

      - name: Inicializar Terraform
        run: terraform init

      - name: Plan Terraform
        run: terraform plan

      - name: Aplicar Terraform (auto-approve)
        run: terraform apply -auto-approve
        