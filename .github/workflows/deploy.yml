name: Deploy Terraform en LocalStack

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Iniciar LocalStack (modo FREE)
        uses: localstack/setup-localstack@v0.2.3
        with:
          services: s3
          image-tag: "latest"
          wait: 30

      - name: Inicializar Terraform
        run: terraform init

      - name: Plan Terraform
        run: terraform plan

      - name: Aplicar Terraform (auto-approve)
        run: terraform apply -auto-approve
